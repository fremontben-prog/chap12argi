## ============================================================================
## .github/workflows/cicd.yml
## Pipeline CI/CD — Crop Yield Predictor
##
## Triggers :
##   - Push sur master ou develop
##   - Pull Request vers master
##
## Jobs :
##   1. test        → tests unitaires (modèles factices, rapide)
##   2. integration → tests d'intégration (vrais .joblib, via GitHub Release)
##   3. build       → construction image Docker
##   4. push-docker → publication Docker Hub (master uniquement)
## ============================================================================

name: CI/CD — Crop Yield Predictor

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/crop-yield-api
  PYTHON_VERSION: "3.10"

jobs:

  # ============================================================
  # JOB 1 — TESTS UNITAIRES (modèles factices, toujours lancés)
  # ============================================================
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installation des dépendances
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx
          pip show pydantic

      - name: Lancement des tests unitaires
        run: |
          pytest api/tests/test_api.py \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v
        env:
          MODELS_DIR: api/tests/fixtures/models_par_culture
          METADATA_PATH: api/tests/fixtures/model_metadata.json

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ============================================================
  # JOB 2 — TESTS D'INTÉGRATION (vrais .joblib)
  # Lance uniquement sur push (pas sur PR) pour limiter les coûts
  # ============================================================
  integration:
    name: Tests integration
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installation des dépendances
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest httpx

      - name: Téléchargement des modèles depuis GitHub Releases
        run: |
          mkdir -p api/models_par_culture

          ## Télécharge l'archive models.tar.gz depuis la dernière release
          ## Le tag 'models-latest' est mis à jour manuellement après chaque
          ## réentraînement des modèles (voir section "Publier les modèles")
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -o models.tar.gz \
            "https://github.com/${{ github.repository }}/releases/download/models-latest/models.tar.gz"

          tar -xzf models.tar.gz -C api/
          echo "Modèles disponibles :"
          ls api/models_par_culture/

      - name: Debug fichiers
        run: |
          ls api/
          ls api/models_par_culture/

      - name: Debug env
        run: |
          echo "MODELS_DIR=$MODELS_DIR"
          echo "METADATA_PATH=$METADATA_PATH"
          python -c "import os; from pathlib import Path; p=Path(os.getenv('MODELS_DIR')); print(p.exists(), list(p.glob('*.joblib'))[:3])"
        env:
          MODELS_DIR: api/models_par_culture
          METADATA_PATH: api/model_metadata.json

      - name: Lancement des tests d'intégration
        run: |
          cd api
          pytest tests/test_integration.py \
            -v \
            -m integration
        env:
          MODELS_DIR: models_par_culture
          METADATA_PATH: model_metadata.json

  # ============================================================
  # JOB 3 — BUILD DOCKER
  # ============================================================
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [test, integration]
    ## Si integration est skippé (PR), on attend seulement test
    if: always() && needs.test.result == 'success' && (needs.integration.result == 'success' || needs.integration.result == 'skipped')

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image (sans push)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: false
          load: true        # ← ajouter ça pour charger l'image localement
          tags: ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Diagnostic taille image   # ← ajouter ce step
          run: |
            echo "=== Gros répertoires ==="
            docker run --rm ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }} \
              du -sh /* 2>/dev/null | sort -rh | head -20
            echo "=== Fichiers > 10MB ==="
            docker run --rm ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }} \
              find / -type f -size +10M 2>/dev/null | xargs ls -lh 2>/dev/null | sort -k5 -rh

  # ============================================================
  # JOB 4 — PUSH DOCKER HUB (master uniquement)
  # ============================================================
  push-docker:
    name: Push Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push (latest + sha)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


